<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>3D Viewer Test</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 12px; }
      #toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
      #status { margin-bottom: 12px; padding: 8px; border: 1px solid #ddd; background: #fafafa; }
      #statusText { margin: 0; font-size: 14px; }
      #app { width: 100%; height: 70vh; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <input id="fileInput" type="file" />
      <button id="uploadBtn">Upload</button>
      <button id="convertBtn">Convert</button>
      <button id="openBtn">Open Viewer</button>
      <button id="zoomInBtn">Zoom In</button>
      <button id="zoomOutBtn">Zoom Out</button>
      <button id="homeBtn">Home</button>
      <button id="panOnBtn">Pan On</button>
      <button id="panOffBtn">Pan Off</button>
      <button id="selectBtn">Select</button>
      <button id="areaSelectBtn">Area Select</button>
      <button id="orbitBtn">Orbit</button>
      <button id="rotateZBtn">Rotate Z</button>
      <button id="walkThroughBtn">Walk Through</button>
      <button id="zoomWindowBtn">Zoom Window</button>
      <button id="zoomFitBtn">Zoom Fit</button>
      <button id="drawModeShadedBtn">DrawMode Shaded</button>
      <button id="drawModeWireframeBtn">DrawMode Wireframe</button>
      <button id="drawModeHiddenLineBtn">DrawMode Hidden Line</button>
      <button id="drawModeShadedWireBtn">DrawMode Shaded Wire</button>
      <button id="drawModeXrayBtn">DrawMode XRay</button>
      <button id="drawModeGhostingBtn">DrawMode Ghosting</button>
      <button id="explodeHalfBtn">Explode 0.5</button>
      <button id="explodeOffBtn">Explode Off</button>
      <button id="openClippingBtn">Open Clipping</button>
      <button id="openSettingBtn">Open Setting</button>
      <button id="openStatesObjectsBtn">Open States Objects</button>
      <button id="openLinkedObjectsBtn">Open Linked Objects</button>
      <!-- <button id="disableAll3dToolbarBtn">Disable All 3D Toolbar</button>
      <button id="enableAll3dToolbarBtn">Enable All 3D Toolbar</button>
      <button id="disableAllPdfToolbarBtn">Disable All PDF Toolbar</button>
      <button id="enableAllPdfToolbarBtn">Enable All PDF Toolbar</button> -->
    </div>

    <div id="status">
      <p id="statusText">Idle</p>
    </div>

    <div id="app" style="width: 100%; height: 550px"></div>

    <script src="/bundle.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HC Viewer Test</title>
</head>
<body>

  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <label for="baseUrlInput">Base URL</label>
    <input id="baseUrlInput" value="https://dev.3dviewer.anybim.vn" style="width:320px;" />
    <input id="fileInput" type="file" />
    <button id="uploadBtn">Upload File</button>
    <button id="convertBtn">Convert File</button>
    <button id="openBtn">Open Viewer</button>
  </div>

  <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
  <button id="zoomInBtn">Zoom In 20%</button>
  <button id="zoomOutBtn">Zoom Out 20%</button>
  <button id="homeBtn">Home</button>
  <button id="panOnBtn">Pan On</button>
  <button id="panOffBtn">Pan Off</button>
  </div>

  <div id="statusText" style="margin-top:10px; font-family: monospace; font-size: 13px; color:#222;">
    Status: idle
  </div>

  <div id="app"
       style="width:100%; height:600px; margin-top:20px; border:1px solid #ccc;">
  </div>

  <script src="/bundle.js"></script>
</body>
</html>
